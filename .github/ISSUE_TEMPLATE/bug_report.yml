name: Bug report
description: Report a defect in Harness (unexpected behavior, crash, broken install, etc.)
title: "[bug] "
labels: ["bug", "needs-triage"]
assignees:
  - revfactory
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Before submitting, please skim open issues to avoid duplicates.

        **Triage SLA:** we aim to label new issues within 48h and respond substantively within 72h on business days (see [CONTRIBUTING.md](../../CONTRIBUTING.md)).

  - type: input
    id: codex-version
    attributes:
      label: Codex version
      description: Output of `codex --version` (e.g. `2.3.1`)
      placeholder: "2.x.y"
    validations:
      required: true

  - type: dropdown
    id: install-mode
    attributes:
      label: Install or usage mode
      description: How were you using codex-harness when this happened?
      options:
        - "Repo-local plugin"
        - "Personal marketplace plugin"
        - "Direct scaffold script"
        - "Reference-only prompt"
        - "Other / not sure"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Commands, config, and inputs please.
      placeholder: |
        1. Install the local plugin through a repo or personal marketplace
        2. `codex "build a harness for ..."`
        3. observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages / stack traces verbatim.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - "macOS"
        - "Linux"
        - "Windows (WSL)"
        - "Windows (native)"
        - "Other (describe below)"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: Logs, screenshots, or anything else that might help. Redact anything sensitive.
    validations:
      required: false
